<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>My Blog</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
}

body {
    background: #f5f6f8;
    color: #333;
}

/* ===== 背景图 ===== */
.header {
    height: 360px;
    background-image: url("images/header-bg.jpg");
    background-size: cover;
    background-position: center;
    position: relative;
}
.header::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.35);
}

/* ===== 头像浮层 ===== */
.profile {
    position: relative;
    text-align: center;
    margin-top: -80px;
    z-index: 10;
}

.avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 5px solid #fff;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.name { font-size: 24px; font-weight: bold; margin-top: 10px; }
.bio { font-size: 14px; color: #666; }

/* ===== 搜索 ===== */
.toolbar {
    max-width: 900px;
    margin: 20px auto;
    padding: 0 20px;
}

.toolbar input {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    box-shadow: 0 4px 18px rgba(0,0,0,0.08);
}

/* ===== 列表 ===== */
.container {
    max-width: 900px;
    margin: 20px auto 80px;
    padding: 0 20px;
}

.post {
    background: white;
    padding: 18px;
    border-radius: 14px;
    margin-bottom: 14px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.06);
    cursor: pointer;
}

/* ===== 发布按钮（淡黄色） ===== */
.fab {
    position: fixed;
    right: 20px;
    bottom: 20px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #facc15;
    color: #111;
    font-size: 30px;
    border: none;
    cursor: pointer;
}

/* =========================
   ✍️ 写作界面
========================= */
.editor {
    display: none;
    position: fixed;
    inset: 0;
    background: white;
    z-index: 999;
    flex-direction: column;
}

.editor-top {
    display: flex;
    justify-content: space-between;
    padding: 14px;
    border-bottom: 1px solid #eee;
}

.exit {
    background: none;
    border: none;
    font-size: 22px;
    color: #999;
    cursor: pointer;
}

.editor input, .editor textarea {
    width: 100%;
    border: none;
    outline: none;
    padding: 14px;
    font-size: 16px;
}

.editor textarea {
    flex: 1;
}

/* ===== 阅读页 ===== */
.reader {
    display: none;
    position: fixed;
    inset: 0;
    background: white;
    z-index: 1000;
    overflow: auto;
}

.reader-exit {
    position: fixed;
    top: 14px;
    left: 14px;
    background: none;
    border: none;
    font-size: 22px;
    color: #999;
}

.reader-content {
    max-width: 700px;
    margin: 90px auto;
    padding: 20px;
}

.reader-title { font-size: 28px; font-weight: bold; }
.reader-date { font-size: 13px; color: #999; margin-top: 8px; }
.reader-bio { margin-top: 10px; color: #666; font-size: 14px; }

.reader-text {
    margin-top: 20px;
    line-height: 1.8;
}

/* ===== 媒体 ===== */
.media {
    margin-top: 15px;
}

.media img {
    max-width: 100%;
    border-radius: 10px;
    margin-top: 10px;
    cursor: zoom-in;
}

.media video {
    max-width: 100%;
    border-radius: 10px;
    margin-top: 10px;
}

/* 图片放大（非全屏） */
.zoom {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    max-width: 80%;
    max-height: 80%;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    cursor: zoom-out;
    z-index: 2000;
}

/* 删除（淡） */
.delete {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(0,0,0,0.06);
    border: none;
    padding: 10px 14px;
    border-radius: 10px;
    cursor: pointer;
    color: #666;
}
</style>
</head>

<body>

<div class="header"></div>

<div class="profile">
    <img src="images/avatar.jpg" class="avatar">
    <div class="name">安宁</div>
    <div class="bio">My Blog</div>
</div>

<!-- 搜索 -->
<div class="toolbar">
    <input placeholder="搜索..." oninput="search(this.value)">
</div>

<div class="container" id="list"></div>

<button class="fab" onclick="openEditor()">＋</button>

<!-- 写作 -->
<div class="editor" id="editor">

    <div class="editor-top">
        <button class="exit" onclick="closeEditor()">×</button>
        <button onclick="publish()">发布</button>
    </div>

    <input id="title" placeholder="标题">
    <input id="bio" placeholder="简介（可选）">
    <textarea id="content" placeholder="内容（支持图片/视频URL）"></textarea>
</div>

<!-- 阅读 -->
<div class="reader" id="reader">

    <button class="reader-exit" onclick="closeReader()">×</button>

    <div class="reader-content">
        <div class="reader-title" id="rTitle"></div>
        <div class="reader-date" id="rDate"></div>
        <div class="reader-bio" id="rBio"></div>
        <div class="reader-text" id="rText"></div>
        <div class="media" id="rMedia"></div>
    </div>

    <button class="delete" onclick="remove()">删除</button>
</div>

<script>
let posts = JSON.parse(localStorage.getItem("posts")) || [];
let current = null;

/* 渲染 */
function render(list = posts) {
    const el = document.getElementById("list");
    el.innerHTML = "";

    list.forEach((p,i)=>{
        el.innerHTML += `
        <div class="post" onclick="openPost(${i})">
            <h3>${p.title}</h3>
            <div style="font-size:12px;color:#999">${p.date}</div>
        </div>`;
    });
}

/* 发布 */
function publish() {
    const title = title.value;
    const bio = document.getElementById("bio").value;
    const content = document.getElementById("content").value;

    const media = extractMedia(content);

    posts.unshift({
        title,
        bio,
        content,
        media,
        date: new Date().toISOString().slice(0,10)
    });

    localStorage.setItem("posts", JSON.stringify(posts));

    closeEditor();
    render();
}

/* 提取图片视频 */
function extractMedia(text){
    const imgs = [...text.matchAll(/(https?:\/\/.*\.(jpg|png|jpeg))/g)].map(m=>m[1]);
    const vids = [...text.matchAll(/(https?:\/\/.*\.(mp4|webm))/g)].map(m=>m[1]);

    return {imgs, vids};
}

/* 打开 */
function openPost(i){
    current = i;
    const p = posts[i];

    document.getElementById("rTitle").innerText = p.title;
    document.getElementById("rDate").innerText = p.date;
    document.getElementById("rBio").innerText = p.bio || "";
    document.getElementById("rText").innerText = p.content;

    const media = document.getElementById("rMedia");
    media.innerHTML = "";

    (p.media?.imgs || []).forEach(src=>{
        media.innerHTML += `<img src="${src}" onclick="zoom(this)">`;
    });

    (p.media?.vids || []).forEach(src=>{
        media.innerHTML += `<video src="${src}" controls></video>`;
    });

    document.getElementById("reader").style.display = "block";
}

/* 放大图片 */
function zoom(img){
    const z = document.createElement("img");
    z.src = img.src;
    z.className = "zoom";
    z.onclick = ()=>z.remove();
    document.body.appendChild(z);
}

/* 删除 */
function remove(){
    posts.splice(current,1);
    localStorage.setItem("posts", JSON.stringify(posts));
    closeReader();
    render();
}

/* 搜索 */
function search(k){
    k = k.toLowerCase();
    render(posts.filter(p=>
        p.title.toLowerCase().includes(k) ||
        p.content.toLowerCase().includes(k)
    ));
}

/* 控制 */
function openEditor(){ editor.style.display="flex"; }
function closeEditor(){ editor.style.display="none"; }
function closeReader(){ reader.style.display="none"; }

/* 初始化 */
render();
</script>

</body>
</html>
