<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>My Blog</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
}

body {
    background: #f5f6f8;
    color: #333;
}

/* ===== 背景图 ===== */
.header {
    height: 360px;
    background-image: url("images/header-bg.jpg");
    background-size: cover;
    background-position: center;
    position: relative;
}

/* 暗层 */
.header::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.35);
}

/* ===== 头像（关键：浮在背景上层） ===== */
.profile {
    position: relative;
    text-align: center;
    margin-top: -80px;
    z-index: 10;
}

.avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 5px solid #fff;
    object-fit: cover;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.name {
    font-size: 24px;
    font-weight: bold;
    margin-top: 10px;
}

.bio {
    font-size: 14px;
    color: #666;
}

/* ===== 搜索 ===== */
.toolbar {
    max-width: 900px;
    margin: 20px auto;
    padding: 0 20px;
}

.toolbar input {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    box-shadow: 0 4px 18px rgba(0,0,0,0.08);
}

/* ===== 列表 ===== */
.container {
    max-width: 900px;
    margin: 20px auto 80px;
    padding: 0 20px;
}

.post {
    background: white;
    padding: 18px;
    border-radius: 14px;
    margin-bottom: 14px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.06);
    cursor: pointer;
    transition: 0.2s;
}

.post:hover {
    transform: translateY(-3px);
}

/* ===== 悬浮按钮 ===== */
.fab {
    position: fixed;
    right: 20px;
    bottom: 20px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #111;
    color: white;
    font-size: 30px;
    border: none;
    cursor: pointer;
}

/* =========================
   ✍️ 写作界面（全屏）
========================= */
.editor {
    display: none;
    position: fixed;
    inset: 0;
    background: white;
    z-index: 999;
    flex-direction: column;
}

/* 顶部栏 */
.editor-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid #eee;
}

/* 淡雅退出按钮 */
.exit {
    font-size: 22px;
    border: none;
    background: transparent;
    color: #999;
    cursor: pointer;
}

.editor input {
    padding: 16px;
    border: none;
    outline: none;
    font-size: 18px;
    border-bottom: 1px solid #eee;
}

.editor textarea {
    flex: 1;
    padding: 16px;
    border: none;
    outline: none;
    resize: none;
    font-size: 15px;
    line-height: 1.6;
}

/* =========================
   📖 阅读界面
========================= */
.reader {
    display: none;
    position: fixed;
    inset: 0;
    background: white;
    z-index: 1000;
    overflow: auto;
}

/* 阅读退出按钮 */
.reader-exit {
    position: fixed;
    top: 14px;
    left: 14px;
    font-size: 22px;
    border: none;
    background: transparent;
    color: #999;
    cursor: pointer;
}

.reader-content {
    max-width: 700px;
    margin: 90px auto;
    padding: 20px;
}

.reader-title {
    font-size: 28px;
    font-weight: bold;
}

.reader-date {
    font-size: 13px;
    color: #999;
    margin-top: 8px;
}

.reader-text {
    margin-top: 20px;
    line-height: 1.8;
    color: #444;
}
</style>
</head>

<body>

<div class="header"></div>

<!-- 头像（浮在背景上层） -->
<div class="profile">
    <img src="images/avatar.jpg" class="avatar">
    <div class="name">安宁</div>
    <div class="bio">My Blog</div>
</div>

<!-- 搜索 -->
<div class="toolbar">
    <input placeholder="搜索文章..." oninput="searchPosts(this.value)">
</div>

<!-- 列表 -->
<div class="container" id="list"></div>

<!-- 发布按钮 -->
<button class="fab" onclick="openEditor()">＋</button>

<!-- =========================
     ✍️ 写作界面
========================= -->
<div class="editor" id="editor">

    <div class="editor-top">
        <button class="exit" onclick="closeEditor()">×</button>
        <button onclick="publish()">发布</button>
    </div>

    <input id="title" placeholder="标题">
    <textarea id="content" placeholder="开始写点什么..."></textarea>
</div>

<!-- =========================
     📖 阅读界面
========================= -->
<div class="reader" id="reader">

    <button class="reader-exit" onclick="closeReader()">×</button>

    <div class="reader-content">
        <div class="reader-title" id="rTitle"></div>
        <div class="reader-date" id="rDate"></div>
        <div class="reader-text" id="rText"></div>
    </div>
</div>

<script>
let posts = JSON.parse(localStorage.getItem("posts")) || [];
let currentIndex = null;

/* 渲染列表 */
function render(list = posts) {
    const el = document.getElementById("list");
    el.innerHTML = "";

    list.forEach((p, i) => {
        el.innerHTML += `
        <div class="post" onclick="openPost(${i})">
            <h3>${p.title}</h3>
            <div style="font-size:12px;color:#999;margin-top:6px">${p.date}</div>
        </div>`;
    });
}

/* 发布 */
function publish() {
    const title = document.getElementById("title").value;
    const content = document.getElementById("content").value;

    if (!title) return;

    posts.unshift({
        title,
        content,
        date: new Date().toISOString().slice(0,10)
    });

    localStorage.setItem("posts", JSON.stringify(posts));

    closeEditor();
    render();
}

/* 打开文章 */
function openPost(i) {
    currentIndex = i;
    const p = posts[i];

    document.getElementById("rTitle").innerText = p.title;
    document.getElementById("rDate").innerText = p.date;
    document.getElementById("rText").innerText = p.content;

    document.getElementById("reader").style.display = "block";
}

/* 搜索 */
function searchPosts(k) {
    k = k.toLowerCase();
    render(posts.filter(p =>
        p.title.toLowerCase().includes(k) ||
        p.content.toLowerCase().includes(k)
    ));
}

/* 编辑器控制 */
function openEditor() {
    document.getElementById("editor").style.display = "flex";
}

function closeEditor() {
    document.getElementById("editor").style.display = "none";
    document.getElementById("title").value = "";
    document.getElementById("content").value = "";
}

/* 阅读页关闭 */
function closeReader() {
    document.getElementById("reader").style.display = "none";
}

/* 初始化 */
render();
</script>

</body>
</html>
