<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>My Blog</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
}

body {
    background: #f5f6f8;
    color: #333;
}

/* ===== 头图（恢复图片模式） ===== */
.header {
    height: 380px;
    background-image: url("images/header-bg.jpg");
    background-size: cover;
    background-position: center;
    position: relative;
}
.header::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.35);
}

/* ===== 个人信息 ===== */
.profile {
    text-align: center;
    margin-top: -80px;
}

.avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 5px solid #fff;
    object-fit: cover;
}

.name {
    font-size: 24px;
    font-weight: bold;
    margin-top: 10px;
}

.bio {
    font-size: 14px;
    color: #666;
}

/* ===== 搜索 ===== */
.toolbar {
    max-width: 900px;
    margin: 20px auto;
    padding: 0 20px;
}

.toolbar input {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    box-shadow: 0 4px 18px rgba(0,0,0,0.08);
}

/* ===== 列表 ===== */
.container {
    max-width: 900px;
    margin: 20px auto 80px;
    padding: 0 20px;
}

.post {
    background: white;
    padding: 18px;
    border-radius: 14px;
    margin-bottom: 14px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.06);
    cursor: pointer;
    transition: 0.2s;
}

.post:hover {
    transform: translateY(-3px);
}

/* ===== 悬浮按钮 ===== */
.fab {
    position: fixed;
    right: 20px;
    bottom: 20px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #111;
    color: white;
    font-size: 30px;
    border: none;
    cursor: pointer;
}

/* ===== 全屏编辑器 ===== */
.editor {
    display: none;
    position: fixed;
    inset: 0;
    background: white;
    z-index: 999;
    flex-direction: column;
}

.editor header {
    padding: 16px;
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #eee;
}

.editor input, .editor textarea {
    width: 100%;
    border: none;
    outline: none;
    padding: 16px;
    font-size: 16px;
}

.editor textarea {
    flex: 1;
    resize: none;
}

.editor button {
    background: #111;
    color: white;
    border: none;
    padding: 10px 14px;
    border-radius: 8px;
}

/* ===== 阅读页 ===== */
.reader {
    display: none;
    position: fixed;
    inset: 0;
    background: #fff;
    z-index: 1000;
    overflow: auto;
}

.reader-content {
    max-width: 700px;
    margin: 80px auto;
    padding: 20px;
}

.reader-title {
    font-size: 28px;
    font-weight: bold;
}

.reader-date {
    font-size: 13px;
    color: #999;
    margin-top: 8px;
}

.reader-text {
    margin-top: 20px;
    line-height: 1.7;
    color: #444;
}

/* 阅读页淡删除 */
.reader-delete {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(0,0,0,0.05);
    border: none;
    padding: 10px 14px;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="header"></div>

<div class="profile">
    <img src="images/avatar.jpg" class="avatar">
    <div class="name">安宁</div>
    <div class="bio">My Blog</div>
</div>

<!-- 搜索 -->
<div class="toolbar">
    <input placeholder="搜索文章..." oninput="searchPosts(this.value)">
</div>

<!-- 列表 -->
<div class="container" id="list"></div>

<!-- 发布按钮 -->
<button class="fab" onclick="openEditor()">＋</button>

<!-- 全屏编辑 -->
<div class="editor" id="editor">
    <header>
        <span>写文章</span>
        <button onclick="publish()">发布</button>
    </header>
    <input id="title" placeholder="标题">
    <textarea id="content" placeholder="开始写点什么..."></textarea>
</div>

<!-- 阅读页 -->
<div class="reader" id="reader">
    <div class="reader-content">
        <div class="reader-title" id="rTitle"></div>
        <div class="reader-date" id="rDate"></div>
        <div class="reader-text" id="rText"></div>
    </div>
    <button class="reader-delete" onclick="deleteCurrent()">删除</button>
</div>

<script>
let posts = JSON.parse(localStorage.getItem("posts")) || [];
let currentIndex = null;

/* 列表渲染 */
function render(list = posts) {
    const el = document.getElementById("list");
    el.innerHTML = "";

    list.forEach((p, i) => {
        el.innerHTML += `
        <div class="post" onclick="openPost(${i})">
            <h3>${p.title}</h3>
            <div style="font-size:12px;color:#999;margin-top:6px">${p.date}</div>
        </div>`;
    });
}

/* 发布 */
function publish() {
    const title = document.getElementById("title").value;
    const content = document.getElementById("content").value;

    if (!title) return;

    posts.unshift({
        title,
        content,
        date: new Date().toISOString().slice(0,10)
    });

    localStorage.setItem("posts", JSON.stringify(posts));

    closeEditor();
    render();
}

/* 打开文章 */
function openPost(i) {
    currentIndex = i;
    const p = posts[i];

    document.getElementById("rTitle").innerText = p.title;
    document.getElementById("rDate").innerText = p.date;
    document.getElementById("rText").innerText = p.content;

    document.getElementById("reader").style.display = "block";
}

/* 删除（淡按钮） */
function deleteCurrent() {
    if (currentIndex === null) return;

    posts.splice(currentIndex, 1);
    localStorage.setItem("posts", JSON.stringify(posts));

    closeReader();
    render();
}

/* 编辑器 */
function openEditor() {
    document.getElementById("editor").style.display = "flex";
}

function closeEditor() {
    document.getElementById("editor").style.display = "none";
    document.getElementById("title").value = "";
    document.getElementById("content").value = "";
}

/* 阅读页关闭 */
function closeReader() {
    document.getElementById("reader").style.display = "none";
}

/* 搜索 */
function searchPosts(k) {
    k = k.toLowerCase();
    render(posts.filter(p =>
        p.title.toLowerCase().includes(k) ||
        p.content.toLowerCase().includes(k)
    ));
}

/* 初始化 */
render();
</script>

</body>
</html>
