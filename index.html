<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>My Blog</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
}

body {
    background: #f5f6f8;
    color: #333;
}

/* ===== 头图 ===== */
.header {
    height: 320px;
    background: linear-gradient(120deg, #4f46e5, #9333ea);
}

/* ===== 个人信息 ===== */
.profile {
    text-align: center;
    margin-top: -70px;
}

.avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 5px solid #fff;
    object-fit: cover;
}

.name {
    font-size: 24px;
    font-weight: bold;
    margin-top: 10px;
}

.bio {
    color: #666;
    font-size: 14px;
}

/* ===== 搜索 ===== */
.toolbar {
    max-width: 900px;
    margin: 20px auto;
    padding: 0 20px;
}

.toolbar input {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    box-shadow: 0 4px 18px rgba(0,0,0,0.08);
}

/* ===== 容器 ===== */
.container {
    max-width: 900px;
    margin: 20px auto 60px;
    padding: 0 20px;
}

/* ===== 卡片 ===== */
.post {
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    padding: 18px;
    border-radius: 14px;
    margin-bottom: 16px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.06);
    transition: 0.2s;
    position: relative;
}

.post:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.12);
}

.post h2 {
    font-size: 18px;
}

.date {
    font-size: 12px;
    color: #999;
    margin-top: 6px;
}

.summary {
    margin-top: 10px;
    font-size: 14px;
    color: #555;
}

/* 删除按钮 */
.delete {
    position: absolute;
    right: 12px;
    top: 12px;
    background: #ef4444;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 4px 8px;
    cursor: pointer;
    font-size: 12px;
}

/* ===== 悬浮按钮 ===== */
.fab {
    position: fixed;
    right: 20px;
    bottom: 20px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #4f46e5;
    color: white;
    font-size: 30px;
    border: none;
    cursor: pointer;
}

/* ===== 弹窗 ===== */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: white;
    padding: 20px;
    border-radius: 12px;
    width: 320px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.modal-content input {
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
}

.modal-content button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.save {
    background: #4f46e5;
    color: white;
}

.close {
    background: #eee;
}
</style>
</head>

<body>

<div class="header"></div>

<div class="profile">
    <img src="images/avatar.jpg" class="avatar">
    <div class="name">安宁</div>
    <div class="bio">My Personal Blog</div>
</div>

<!-- 搜索 -->
<div class="toolbar">
    <input type="text" placeholder="搜索文章..." oninput="searchPosts(this.value)">
</div>

<!-- 内容 -->
<div class="container" id="container"></div>

<!-- 悬浮按钮 -->
<button class="fab" onclick="openModal()">＋</button>

<!-- 弹窗 -->
<div class="modal" id="modal">
    <div class="modal-content">
        <input id="title" placeholder="标题">
        <input id="summary" placeholder="摘要">
        <button class="save" onclick="addPost()">发布</button>
        <button class="close" onclick="closeModal()">关闭</button>
    </div>
</div>

<script>
let posts = JSON.parse(localStorage.getItem("posts")) || [];

/* 初始渲染 */
function render(list = posts) {
    const container = document.getElementById("container");
    container.innerHTML = "";

    list.forEach((post, index) => {
        container.innerHTML += `
        <div class="post">
            <button class="delete" onclick="deletePost(${index})">删除</button>
            <h2>${post.title}</h2>
            <div class="date">${post.date}</div>
            <div class="summary">${post.summary}</div>
        </div>`;
    });
}

/* 发布 */
function addPost() {
    const title = document.getElementById("title").value;
    const summary = document.getElementById("summary").value;

    if (!title) return;

    posts.unshift({
        title,
        summary,
        date: new Date().toISOString().slice(0, 10)
    });

    localStorage.setItem("posts", JSON.stringify(posts));

    closeModal();
    render();
}

/* 删除 */
function deletePost(index) {
    posts.splice(index, 1);
    localStorage.setItem("posts", JSON.stringify(posts));
    render();
}

/* 搜索 */
function searchPosts(keyword) {
    keyword = keyword.toLowerCase();

    const filtered = posts.filter(p =>
        p.title.toLowerCase().includes(keyword) ||
        p.summary.toLowerCase().includes(keyword)
    );

    render(filtered);
}

/* 弹窗 */
function openModal() {
    document.getElementById("modal").style.display = "flex";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
    document.getElementById("title").value = "";
    document.getElementById("summary").value = "";
}

/* 初始化 */
render();
</script>

</body>
</html>
