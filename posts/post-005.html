<h1> 我的爱人</h1>
<div class="date">2026-01-23</div>

<p>O！我的爱人
如果我正轻轻发抖
紧贴的眼皮流不出泪来
被肺里肿胀的空气
带上那太高的
令我害怕的蓝天
请你靠近些来
让我的腰与颈
感受到你手掌的温暖
我知道那是血液
淌过你的心脏 

让我的腰与颈
散去了其上刺人的雾
我已经可以醒来
空气自由轻盈地进出我的肺
血液流过温热的心脏
我晃晃悠悠从高空落下
平平安安回到地上</p>
